<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="/assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/vendor/tabler/tabler.min.css">
    <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1>管理员登录</h1>
        <p class="muted">演示账号：`admin / 123456` 或 `superadmin / 123456`</p>
        <form class="auth-form" id="login-form">
            <input id="username" placeholder="管理员用户名" value="admin">
            <input id="password" type="password" placeholder="密码" value="123456">
            <button class="btn" type="submit">进入管理台</button>
            <a class="btn secondary" href="/user/login.html">返回用户端</a>
        </form>
    </div>
</div>
<script src="/assets/js/app.js"></script>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/vendor/tabler/tabler.min.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    try {
        const data = await app.request("/api/auth/admin/login", {
            method: "POST",
            body: JSON.stringify({
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value.trim()
            })
        });
        app.saveSession(data);
        location.href = "/admin/dashboard.html";
    } catch (error) {
        alert(error.message);
    }
});
</script>
</body>
</html>
